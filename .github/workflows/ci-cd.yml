name: CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - backend/**
      - deploy/**
      - .github/workflows/ci-cd.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - deploy/**
      - .github/workflows/ci-cd.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dms-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, intl, bcmath, pdo_sqlite, sqlite3
          coverage: none

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: php artisan test --no-interaction

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - test-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -Eeuo pipefail
          [ -n "$DEPLOY_HOST" ] || (echo "Missing secret: DEPLOY_HOST" && exit 1)
          [ -n "$DEPLOY_USER" ] || (echo "Missing secret: DEPLOY_USER" && exit 1)
          [ -n "$DEPLOY_SSH_KEY" ] || (echo "Missing secret: DEPLOY_SSH_KEY" && exit 1)

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -Eeuo pipefail
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_REPO_DIR: ${{ secrets.DEPLOY_REPO_DIR }}
          DEPLOY_APP_BASE: ${{ secrets.DEPLOY_APP_BASE }}
          DEPLOY_MODE: ${{ secrets.DEPLOY_MODE }}
          DEPLOY_GITHUB_REPO: ${{ secrets.DEPLOY_GITHUB_REPO }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          PORT="${DEPLOY_PORT:-22}"
          REPO_DIR="${DEPLOY_REPO_DIR:-/var/www/dms/repo}"
          APP_BASE="${DEPLOY_APP_BASE:-/var/www/dms}"
          BRANCH="${GITHUB_REF_NAME}"
          MODE="${DEPLOY_MODE:-release}"
          REPO_URL="${DEPLOY_GITHUB_REPO:-https://github.com/${GH_REPOSITORY}.git}"

          if [ "$MODE" = "docker" ]; then
            ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -Eeuo pipefail; REPO_DIR='$REPO_DIR'; if [ ! -d \"\$REPO_DIR/.git\" ]; then git clone '$REPO_URL' \"\$REPO_DIR\"; fi; APP_BASE='$APP_BASE' BRANCH='$BRANCH' GITHUB_REPO='$REPO_URL' bash \"\$REPO_DIR/deploy/scripts/docker-deploy.sh\""
          else
            ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -Eeuo pipefail; cd '$REPO_DIR'; APP_BASE='$APP_BASE' BRANCH='$BRANCH' bash deploy/scripts/deploy.sh"
          fi
